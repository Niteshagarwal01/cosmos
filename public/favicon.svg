<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#000"/>

  <!-- Orbit ring -->
  <circle cx="16" cy="16" r="9" stroke="#c8ff00" stroke-width="1.5" stroke-dasharray="3.5 2.2" stroke-linecap="round" opacity="0.45"/>

  <!-- Inner cross-hairs (phase space axes) -->
  <line x1="16" y1="8" x2="16" y2="24" stroke="#c8ff00" stroke-width="0.8" opacity="0.2"/>
  <line x1="8" y1="16" x2="24" y2="16" stroke="#c8ff00" stroke-width="0.8" opacity="0.2"/>

  <!-- Trajectory arc (dynamic system path) -->
  <path d="M 10 20 Q 10 10 16 9 Q 22 8 23 16" stroke="#c8ff00" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- Particle dot on trajectory -->
  <circle cx="23" cy="16" r="2.2" fill="#c8ff00"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1" fill="#c8ff00" opacity="0.5"/>
</svg>
